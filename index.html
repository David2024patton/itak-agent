<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gradient Page</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: Arial, sans-serif;
            color: #333;
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 0.5em;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        p {
            max-width: 600px;
            text-align: center;
            font-size: 1.2em;
            line-height: 1.5;
            color: #fff;
            margin: 0 20px;
        }
    </style>
</head>
<body>
    <h1>Hello Canvas</h1>
    <p>This is a simple paragraph styled with CSS.</p>
    <p>Another paragraph to demonstrate styling.</p>
</body>
</html>
