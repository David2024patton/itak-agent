# GOAgent Configuration — 30B Model Focus

orchestrator:
  llm:
    provider: nvidia_nim
    model: nvidia/nemotron-3-nano-30b-a3b
    api_base: https://integrate.api.nvidia.com/v1
    api_key: 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
  max_delegations: 5

# Shell safety — block dangerous commands
shell_safety:
  denied_cmds:
    - "format"
    - "del /s /q"

# Memory settings
memory:
  window_size: 20
  auto_reflect: true
  auto_entities: true
  session_workspace: true

data_dir: ./data

agents:
  - name: researcher
    role: Research Analyst
    personality: "Thorough researcher who finds accurate information and summarizes clearly"
    goals:
      - accuracy
      - clarity
    tools:
      - http_fetch
      - file_read
      - file_write
      - memory_save
      - memory_recall
      - skill_list
      - skill_load
    max_loops: 8

  - name: coder
    role: Software Developer
    personality: "Pragmatic developer who writes clean, working code"
    goals:
      - correctness
      - readability
    tools:
      - shell
      - file_read
      - file_write
      - memory_save
      - memory_recall
    max_loops: 10
