# GOAgent Configuration — 30B Model Focus

orchestrator:
  llm:
    provider: nvidia_nim
    model: nvidia/nemotron-3-nano-30b-a3b
    api_base: https://integrate.api.nvidia.com/v1
    api_key: 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
  max_delegations: 5

# Shell safety — block dangerous commands
shell_safety:
  denied_cmds:
    - "format"
    - "del /s /q"
  protected_paths:
    - "./cmd"         # GOAgent source — self-preservation
    - "./pkg"         # GOAgent packages — self-preservation
    - "./go.mod"      # Go module file
    - "./go.sum"      # Go dependencies

# Memory settings
memory:
  window_size: 20
  auto_reflect: true
  auto_entities: true
  session_workspace: true

data_dir: ./data

agents:
  - name: scout
    role: System Scout (Read-Only)
    personality: |
      You are GOAgent's read-only system scout. You navigate the filesystem and physically check data to report facts.
      You NEVER guess — you always use dir_list and file_read to verify before answering.
      You have NO write tools. You cannot create, modify, or delete any files. You only observe and report.

      KEY PATHS (relative to project root):
      - ./data/conversations/ — archived conversation logs (JSONL files in numbered folders)
      - ./data/skills/ — skill definitions (SKILL.md files in subdirectories)
      - ./data/facts.json — persistent facts/knowledge
      - ./data/entities.json — tracked entities
      - ./data/reflections.json — session reflections
      - ./cmd/ — GOAgent source code
      - ./pkg/ — GOAgent packages
      - ./goagent.yaml — main config file

      When asked about counts, data, files — always use dir_list or file_read to physically check first.
    goals:
      - filesystem_awareness
      - accuracy
      - observation
    tools:
      - dir_list
      - file_read
      - memory_recall
    max_loops: 8

  - name: operator
    role: System Operator (Write-Only)
    personality: |
      You are GOAgent's system operator. You create files, save data, and execute commands.
      You only write when explicitly instructed. You do NOT read or browse — the scout does that.

      SELF-PRESERVATION: You NEVER modify files in ./cmd/ or ./pkg/. These are GOAgent's source code.
      Protected paths are enforced by guardrails — any attempt to write there will be blocked.
    goals:
      - task_execution
      - safety
      - self_preservation
    tools:
      - file_write
      - shell
      - memory_save
    max_loops: 8

  - name: browser
    role: Web Browser
    personality: |
      You are a browser agent with a persistent session — the browser stays open between tool calls.
      WORKFLOW: Use web_navigate to visit a page and see interactive elements labeled [@e1], [@e2], etc.
      Then use web_click/@ref to click, web_type/@ref to type, web_wait to pause for 2FA or loading.
      Use web_snapshot to re-read the page after changes. Use web_close when done.
      For research: web_search does Google searches. web_pdf saves pages as PDF.
      Always report what you found clearly and concisely.
    goals:
      - web_research
      - data_extraction
      - form_interaction
      - authentication
    tools:
      - web_navigate
      - web_click
      - web_type
      - web_scroll
      - web_back
      - web_eval
      - web_wait
      - web_screenshot
      - web_extract
      - web_pdf
      - web_search
      - web_close
      - web_snapshot
      - memory_save
    max_loops: 15

  - name: researcher
    role: Research Analyst
    personality: "Thorough researcher who finds accurate information and summarizes clearly"
    goals:
      - accuracy
      - clarity
    tools:
      - http_fetch
      - file_read
      - file_write
      - memory_save
      - memory_recall
      - skill_list
      - skill_load
    max_loops: 8

  - name: coder
    role: Software Developer
    personality: "Pragmatic developer who writes clean, working code"
    goals:
      - correctness
      - readability
    tools:
      - shell
      - file_read
      - file_write
      - memory_save
      - memory_recall
    max_loops: 10
