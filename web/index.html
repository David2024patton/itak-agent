<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iTaK Agent</title>
  <meta name="description" content="iTaK Agent Dashboard - Monitor, chat with, and manage your AI agents">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo">iT</div>
        <div class="brand-text">
          <span class="brand-name">iTaK Agent</span>
          <span class="brand-version" id="version-label">v0.2.0</span>
        </div>
      </div>

      <div class="sidebar-status">
        <span class="dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Loading...</span>
        <span class="status-badge">HTTP</span>
      </div>

      <!-- Chat -->
      <div class="nav-group">
        <div class="nav-group-label">Chat</div>
        <div class="nav-item active" data-page="chat" onclick="navigate('chat')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <span class="nav-text">Chat</span>
        </div>
      </div>

      <!-- Monitor -->
      <div class="nav-group">
        <div class="nav-group-label">Monitor</div>
        <div class="nav-item" data-page="overview" onclick="navigate('overview')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="nav-text">Overview</span>
        </div>
        <div class="nav-item" data-page="analytics" onclick="navigate('analytics')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span class="nav-text">Analytics</span>
        </div>
        <div class="nav-item" data-page="logs" onclick="navigate('logs')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span class="nav-text">Logs</span>
        </div>
      </div>

      <!-- Agents -->
      <div class="nav-group">
        <div class="nav-group-label">Agents</div>
        <div class="nav-item" data-page="agents" onclick="navigate('agents')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span class="nav-text">Sessions</span>
        </div>
      </div>

      <!-- Tasks -->
      <div class="nav-group">
        <div class="nav-group-label">Tasks</div>
        <div class="nav-item" data-page="tasks" onclick="navigate('tasks')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          <span class="nav-text">Task Board</span>
        </div>
        <div class="nav-item" data-page="presentations" onclick="navigate('presentations')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 3 21 3 21 17 3 17 3 3"></polygon><line x1="3" y1="21" x2="21" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
          <span class="nav-text">Presentations</span>
        </div>
      </div>

      <!-- Database -->
      <div class="nav-group">
        <div class="nav-group-label">Database</div>
        <div class="nav-item" data-page="database" onclick="navigate('database')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
          <span class="nav-text">Explorer</span>
        </div>
      </div>

      <!-- System -->
      <div class="nav-group">
        <div class="nav-group-label">System</div>
        <div class="nav-item" data-page="settings" onclick="navigate('settings')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span class="nav-text">Settings</span>
        </div>
      </div>

      <div class="sidebar-footer">
        <span class="shortcut-hints"><kbd>Ctrl</kbd>+<kbd>K</kbd> agents | <kbd>Ctrl</kbd>+<kbd>N</kbd> new</span>
      </div>
    </nav>

    <!-- Sidebar Toggle -->
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle Sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>

    <!-- Main Content Area -->
    <div class="main">
      <header class="main-header">
        <h1 id="page-title">Chat</h1>
        <div class="header-actions">
          <button class="btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          </button>
        </div>
      </header>
      <div class="main-content" id="page-content">
        <!-- Dynamic content injected by app.js -->
      </div>
    </div>
  </div>

  <!-- Task Modal -->
  <div id="task-modal" class="modal-overlay" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h2 id="task-modal-title">New Task</h2>
        <button class="btn btn-icon" onclick="closeTaskModal()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="task-form">
          <input type="hidden" id="task-id">
          <div class="form-group">
            <label for="task-title-input">Title</label>
            <input type="text" id="task-title-input" class="form-control" required placeholder="Task title...">
          </div>
          <div class="form-group">
            <label for="task-desc-input">Description</label>
            <textarea id="task-desc-input" class="form-control" rows="3" placeholder="Task details..."></textarea>
          </div>
          <div class="form-group" id="task-status-group" style="display: none;">
            <label for="task-status-input">Status</label>
            <select id="task-status-input" class="form-control">
              <option value="Todo">Todo</option>
              <option value="In Progress">In Progress</option>
              <option value="Review">Review</option>
              <option value="Done">Done</option>
            </select>
          </div>
          <div class="form-group" id="task-agent-group" style="display: none;">
            <label for="task-agent-input">Assigned Agent</label>
            <input type="text" id="task-agent-input" class="form-control" placeholder="Agent name...">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
